<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Not Found · The Finest Pour</title>
<link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png" />
<link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png" />
<meta name="theme-color" content="#0c0c0d" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0c0c0d; --text: #f1ede3; --text-dim: #a8a59c; --gold: #c9a961;
    --line: #26262a;
    --serif: "Cormorant Garamond", serif;
    --sans: "Inter", -apple-system, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background:
      radial-gradient(ellipse at center, rgba(57,127,119,0.12), transparent 60%),
      var(--bg);
    color: var(--text); font-family: var(--sans); font-weight: 300;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 2rem; text-align: center;
  }
  .wrap { max-width: 520px; }
  .logo-mark { height: 110px; width: auto; margin: 0 auto 1rem; display: block; }
  .eyebrow {
    font-size: 0.72rem; letter-spacing: 0.32em;
    text-transform: uppercase; color: var(--gold); margin-bottom: 1.5rem;
  }
  h1 { font-family: var(--serif); font-size: 5rem; line-height: 1; color: var(--gold); margin-bottom: 1rem; }
  p { color: var(--text-dim); font-size: 1.05rem; margin-bottom: 2rem; line-height: 1.6; }
  .btn {
    display: inline-block; padding: 0.9rem 2rem;
    border: 1px solid var(--gold); color: var(--gold);
    font-size: 0.85rem; letter-spacing: 0.18em; text-transform: uppercase;
    text-decoration: none; transition: all 0.25s;
  }
  .btn:hover { background: var(--gold); color: var(--bg); }
</style>
</head>
<body>
  <div class="wrap">
    <img class="logo-mark" src="assets/logo.png" alt="The Finest Pour" />
    <div class="eyebrow">404</div>
    <h1>Page not found</h1>
    <p>Looks like this page was poured out. Let's get you back to the bar.</p>
    <a href="/" class="btn">Return Home</a>
  </div>
</body>
</html>
